name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
      - name: Install Gradle 8.8
        run: |
          curl -sSL https://services.gradle.org/distributions/gradle-8.8-bin.zip -o gradle-8.8-bin.zip
          unzip -q gradle-8.8-bin.zip
      - name: Build plugin
        run: ./gradle-8.8/bin/gradle build --no-daemon
      - name: Publish to Modrinth
        run: ./gradle-8.8/bin/gradle modrinth --no-daemon
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          generate_release_notes: true
