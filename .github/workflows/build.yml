name: Build

on:
  push:
    branches: ["master", "main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
      - name: Install Gradle 8.8
        run: |
          curl -sSL https://services.gradle.org/distributions/gradle-8.8-bin.zip -o gradle-8.8-bin.zip
          unzip -q gradle-8.8-bin.zip
      - name: Run tests
        run: ./gradle-8.8/bin/gradle test --no-daemon
      - name: Build plugin
        run: ./gradle-8.8/bin/gradle build --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: NoPortals-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
